name: ci

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  container-verify:
    runs-on: ubuntu-latest
    env:
      HTTP_PROXY: ${{ vars.HTTP_PROXY }}
      HTTPS_PROXY: ${{ vars.HTTPS_PROXY }}
      NO_PROXY: ${{ vars.NO_PROXY }}
      APT_MIRROR: ${{ vars.APT_MIRROR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Dev Container Image
        run: |
          docker build \
            --build-arg HTTP_PROXY="$HTTP_PROXY" \
            --build-arg HTTPS_PROXY="$HTTPS_PROXY" \
            --build-arg NO_PROXY="$NO_PROXY" \
            --build-arg APT_MIRROR="${APT_MIRROR:-mirrors.tuna.tsinghua.edu.cn}" \
            -f .devcontainer/Dockerfile -t nextbase-dev .

      - name: Bazel Build Test And Domain Smoke In Container
        run: |
          docker run --rm \
            -e HTTP_PROXY="$HTTP_PROXY" \
            -e HTTPS_PROXY="$HTTPS_PROXY" \
            -e NO_PROXY="$NO_PROXY" \
            -v "${{ github.workspace }}:/workspaces/NextBase" \
            -w /workspaces/NextBase \
            nextbase-dev \
            bash -lc "set -euo pipefail; \
              bazel build //...; \
              bazel test //...; \
              bazel run //services/hello_world/go/hello:hello; \
              bazel run //services/hello_world/rust/hello:hello; \
              bazel run //services/hello_world/cpp/hello:hello; \
              bazel run //services/hello_world/csharp/hello:hello; \
              bazel run //services/hello_world/typescript/hello:hello"
