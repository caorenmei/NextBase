name: ci

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  container-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Toolchain Caches
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/nextbase-cache/bazel
            ${{ runner.temp }}/nextbase-cache/bazelisk
            ${{ runner.temp }}/nextbase-cache/go-mod
            ${{ runner.temp }}/nextbase-cache/go-build
            ${{ runner.temp }}/nextbase-cache/cargo-registry
            ${{ runner.temp }}/nextbase-cache/cargo-git
            ${{ runner.temp }}/nextbase-cache/nuget
            ${{ runner.temp }}/nextbase-cache/npm
          key: ${{ runner.os }}-nextbase-cache-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock', '.devcontainer/Dockerfile', 'services/**/BUILD.bazel') }}
          restore-keys: |
            ${{ runner.os }}-nextbase-cache-

      - name: Prepare Cache Directories
        run: |
          mkdir -p \
            "${{ runner.temp }}/nextbase-cache/bazel" \
            "${{ runner.temp }}/nextbase-cache/bazelisk" \
            "${{ runner.temp }}/nextbase-cache/go-mod" \
            "${{ runner.temp }}/nextbase-cache/go-build" \
            "${{ runner.temp }}/nextbase-cache/cargo-registry" \
            "${{ runner.temp }}/nextbase-cache/cargo-git" \
            "${{ runner.temp }}/nextbase-cache/nuget" \
            "${{ runner.temp }}/nextbase-cache/npm"

      - name: Build Dev Container Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          tags: nextbase-dev:ci
          load: true
          cache-from: type=gha,scope=nextbase-devcontainer
          cache-to: type=gha,mode=max,scope=nextbase-devcontainer

      - name: Bazel Build Test And Domain Smoke In Container
        run: |
          docker run --rm \
            -e XDG_CACHE_HOME=/home/vscode/.cache \
            -e CARGO_HOME=/home/vscode/.cargo \
            -e NUGET_PACKAGES=/home/vscode/.nuget/packages \
            -e GOMODCACHE=/home/vscode/go/pkg/mod \
            -e GOCACHE=/home/vscode/.cache/go-build \
            -v "${{ github.workspace }}:/workspaces/NextBase" \
            -v "${{ runner.temp }}/nextbase-cache/bazel:/home/vscode/.cache/bazel" \
            -v "${{ runner.temp }}/nextbase-cache/bazelisk:/home/vscode/.cache/bazelisk" \
            -v "${{ runner.temp }}/nextbase-cache/go-mod:/home/vscode/go/pkg/mod" \
            -v "${{ runner.temp }}/nextbase-cache/go-build:/home/vscode/.cache/go-build" \
            -v "${{ runner.temp }}/nextbase-cache/cargo-registry:/home/vscode/.cargo/registry" \
            -v "${{ runner.temp }}/nextbase-cache/cargo-git:/home/vscode/.cargo/git" \
            -v "${{ runner.temp }}/nextbase-cache/nuget:/home/vscode/.nuget/packages" \
            -v "${{ runner.temp }}/nextbase-cache/npm:/home/vscode/.npm" \
            -w /workspaces/NextBase \
            nextbase-dev:ci \
            bash -lc "set -euo pipefail; \
              bazel build //...; \
              bazel test //...; \
              bazel run //services/hello_world/go:hello; \
              bazel run //services/hello_world/rust:hello; \
              bazel run //services/hello_world/cpp:hello; \
              bazel run //services/hello_world/csharp:hello; \
              bazel run //services/hello_world/typescript:hello"
